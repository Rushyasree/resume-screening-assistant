name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Compile backend
        run: python -m py_compile backend/main.py backend/classifier.py backend/database.py backend/resume_parser.py backend/skill_engine.py backend/config.py
